# Auto-label each PR from its conventional commit title.
# Accepted types:
# - feat/fix/docs/chore/ci/refactor
# - breaking-change for "type!:" or "type(scope)!:" (scope is optional)
name: PR label

# pull_request_target (not pull_request) so the job also gets a write token on PRs from forks.
# Safe here: the labeler only reads the PR title from the event payload and never checks out the
# fork's code.
on:
  pull_request_target:
    types: [opened, edited]

permissions:
  pull-requests: write

jobs:
  label:
    uses: alkonosst/templates/.github/workflows/reusable-pr-label.yml@v1
